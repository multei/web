# Lighthouse CI against production.
# Temporarily disabled while https://multei.com.br is unavailable
# (CHROME_INTERSTITIAL_ERROR). Re-enable when the site is back — see the
# tracking issue #419.
name: Lighthouse

# Was: on: [push]
# Manual runs only until production is healthy again.
on:
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@12.6.2
        with:
          urls: |
            https://multei.com.br
          uploadArtifacts: false
      - name: Save results
        uses: actions/upload-artifact@v4
        with:
          name: lighthouseresults
          path: .lighthouseci
          if-no-files-found: warn
